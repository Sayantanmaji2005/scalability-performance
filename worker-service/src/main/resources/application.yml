server:
  port: 8081

spring:
  application:
    name: worker-service
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-worker
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.scalemart.worker.service,com.scalemart.api.service
        spring.json.value.default.type: com.scalemart.worker.service.OrderEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: worker-service

app:
  kafka:
    order-topic: order.created
