server:
  port: ${PORT:8081}

spring:
  application:
    name: worker-service
  kafka:
    # Handle Kafka bootstrap servers for Render deployment
    # Priority: SPRING_KAFKA_BOOTSTRAP_SERVERS > SPRING_KAFKA_HOST:SPRING_KAFKA_PORT
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${SPRING_KAFKA_HOST:localhost}:${SPRING_KAFKA_PORT:9092}}
    consumer:
      group-id: order-worker
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.scalemart.worker.service,com.scalemart.api.service
        spring.json.value.default.type: com.scalemart.worker.service.OrderEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: worker-service

app:
  kafka:
    order-topic: order.created
