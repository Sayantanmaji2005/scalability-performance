services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scalemart
      POSTGRES_USER: scalemart
      POSTGRES_PASSWORD: scalemart
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalemart -d scalemart"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  redpanda:
    image: redpandadata/redpanda:v24.2.18
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-1:
    build:
      context: ./backend-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scalemart
      SPRING_DATASOURCE_USERNAME: scalemart
      SPRING_DATASOURCE_PASSWORD: scalemart
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      JWT_SECRET: ${JWT_SECRET:-c2NhbGVtYXJ0LXByb2plY3QtamRrMjEtc2VjdXJlLXNpZ25pbmcta2V5LTIwMjY=}
      APP_DEMO_USER: demo@scalemart.dev
      APP_DEMO_PASSWORD: DemoPass123!
      APP_AUTH_EXPOSE_DEBUG_TOKENS: ${APP_AUTH_EXPOSE_DEBUG_TOKENS:-true}
      APP_SEED_DEMO_USERS: ${APP_SEED_DEMO_USERS:-true}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@scalemart.dev}
      APP_MAIL_BASE_URL: ${APP_MAIL_BASE_URL:-http://localhost:8080}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173,http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  api-2:
    build:
      context: ./backend-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scalemart
      SPRING_DATASOURCE_USERNAME: scalemart
      SPRING_DATASOURCE_PASSWORD: scalemart
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      JWT_SECRET: ${JWT_SECRET:-c2NhbGVtYXJ0LXByb2plY3QtamRrMjEtc2VjdXJlLXNpZ25pbmcta2V5LTIwMjY=}
      APP_DEMO_USER: demo@scalemart.dev
      APP_DEMO_PASSWORD: DemoPass123!
      APP_AUTH_EXPOSE_DEBUG_TOKENS: ${APP_AUTH_EXPOSE_DEBUG_TOKENS:-true}
      APP_SEED_DEMO_USERS: ${APP_SEED_DEMO_USERS:-true}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-no-reply@scalemart.dev}
      APP_MAIL_BASE_URL: ${APP_MAIL_BASE_URL:-http://localhost:8080}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173,http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  worker:
    build:
      context: ./worker-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api/v1}
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_BIND:-8080:80}"

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "${PROMETHEUS_BIND:-9090:9090}"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
    depends_on:
      - api-1
      - api-2
      - worker

  grafana:
    image: grafana/grafana:11.1.5
    ports:
      - "${GRAFANA_BIND:-3000:3000}"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  k6:
    image: grafana/k6:0.55.0
    profiles: ["loadtest"]
    command: ["run", "/scripts/load-test.js"]
    environment:
      BASE_URL: http://nginx
    volumes:
      - ./load-tests:/scripts:ro
    depends_on:
      - nginx

volumes:
  postgres-data:
  redis-data:
  grafana-data:
