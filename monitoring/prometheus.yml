global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-1:8080', 'api-2:8080']
    scrape_interval: 10s

  - job_name: 'worker-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['worker:8081']
    scrape_interval: 10s

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
